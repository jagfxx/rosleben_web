name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 22
          timeout: 200m
          command_timeout: 200m
          script: |
            set -e

            echo "🚀 Iniciando despliegue ROSLEBEN..."

            if [ -d "/home/admin_dany/rosleben_web" ]; then
              PROJECT_DIR="/home/admin_dany/rosleben_web"
            elif [ -d "/root/rosleben_web" ]; then
              PROJECT_DIR="/root/rosleben_web"
            else
              echo "📥 Clonando repositorio por primera vez..."
              cd /home/admin_dany 2>/dev/null || cd /root
              git clone https://github.com/jagfxx/rosleben_web.git
              PROJECT_DIR="$(pwd)/rosleben_web"
            fi

            echo "📁 Directorio del proyecto: $PROJECT_DIR"
            cd "$PROJECT_DIR"

            mkdir -p logs

            echo "📥 Actualizando código desde GitHub..."
            git fetch origin
            git reset --hard origin/main
            git pull origin main

            echo "📦 Instalando dependencias..."
            npm ci --production=false

            echo "🧹 Limpiando build anterior..."
            rm -rf .next

            echo "🔨 Construyendo la aplicación..."
            npm run build

            if [ ! -d ".next/static" ]; then
              echo "❌ Build incompleto: falta .next/static"
              exit 1
            fi

            echo "🔄 Reiniciando aplicación con PM2..."
            if command -v pm2 &> /dev/null; then
              pm2 restart rosleben-web --update-env || pm2 start ecosystem.config.js
              pm2 save
              echo "✅ rosleben-web reiniciado (puerto 3002)"
            else
              echo "⚠️  PM2 no está instalado"
              exit 1
            fi

            echo "🎉 Despliegue ROSLEBEN completado!"
